name: Deploy Website
on:
  push:
    branches: [main]
    paths: ['website/**', 'public/saddle-logo.png']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Copy assets
        run: cp public/saddle-logo.png website/assets/saddle-logo.png
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
